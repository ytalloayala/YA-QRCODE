<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Video Gallery</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .gallery { display: flex; flex-wrap: wrap; gap: 15px; }
        .video { width: calc(33.333% - 15px); background-color: #fff; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        iframe { width: 100%; height: 200px; border: none; border-radius: 5px; }
        h3 { padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <h1>Interactive Video Gallery</h1>
    <div class="gallery">
        <div class="video">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_1" allowfullscreen></iframe>
            <h3>Video Title 1</h3>
        </div>
        <div class="video">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_2" allowfullscreen></iframe>
            <h3>Video Title 2</h3>
        </div>
        <div class="video">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID_3" allowfullscreen></iframe>
            <h3>Video Title 3</h3>
        </div>
        <!-- Add more video entries as needed -->
    </div>
</body>
</html>
